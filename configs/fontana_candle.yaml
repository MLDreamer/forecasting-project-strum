# Fontana Candle Co — pipeline configuration
# Phase 3.5 will wire this to pydantic schema validation.

client: fontana_candle

data:
  raw_dir: data/raw
  sales_file: processed_data_filtered.csv
  master_file: product_item_master.csv
  variants_file: variants_export.csv
  schema_map:
    item_id: item_id
    timestamp: timestamp
    sales: sales
    avg_unit_price: avg_unit_price
    discount_pct: discount_pct
    source_variant_id: source_variant_id
    status: status

lifecycle:
  dormancy_threshold_weeks: 26
  keep_active_overrides:
    - sku_id: 46606700773604
      reason: "High recent velocity; zero-forecasting riskier than model attempt"

densify:
  week_relabel_shift_days: 6   # Sunday (week-start) → Saturday (week-end)

features:
  target_week_features: false  # A/B tested Phase 11.5; rejected — keep OFF

segment:
  fallback_k: 8
  stability_ari_threshold: 0.5
  revenue_tier_anchor: deployment_time

model:
  quantiles: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45,
              0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  horizon_weeks: 26
  cv_folds: 4
  selection_folds: [2, 3, 4]
  calibration_guardrail: [0.75, 0.85]
  use_heavy_models: false

output:
  forecast_horizon_start: "2026-05-24"
  forecast_horizon_end:   "2026-11-15"
